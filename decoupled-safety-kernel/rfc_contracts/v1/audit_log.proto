syntax = "proto3";

package decoupled_safety_kernel.v1;

option go_package = "github.com/raccoonrat/Decoupled-LLM-Safety/decoupled-safety-kernel/rfc_contracts/v1;dskv1";

// Evidence chain: every ⊥ absorption and DCBF boundary crossing must be auditable.
message AuditLogEntry {
  string trace_id = 1;
  // Monotonic event time (Unix nanos, UTC).
  int64 timestamp_unix_nanos = 2;
  oneof event {
    BottomAbsorption bottom = 3;
    DcbfBoundaryEvent dcbf = 4;
  }
}

message BottomAbsorption {
  string reason = 1;
  // Policy / solver stage that forced ⊥.
  string source_component = 2;
}

message DcbfBoundaryEvent {
  // h(x_t) at observation.
  double h_value = 1;
  // (1 - alpha) * h(x_{t-1}) bound that was compared against.
  double bound = 2;
  bool violated = 3;
}

message AuditLog {
  repeated AuditLogEntry entries = 1;
}
